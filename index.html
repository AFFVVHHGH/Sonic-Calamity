<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Calamity</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0c10;
            font-family: system-ui, -apple-system, sans-serif;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background-color: #12131a;
            border-right: 1px solid #1f2029;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            flex-shrink: 0;
        }
        .sidebar-header {
            margin-bottom: 2rem;
            padding-left: 0.5rem;
        }
        .sidebar-header h1 {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #3b82f6;
            text-transform: uppercase;
        }
        .sidebar-header p {
            font-size: 0.8rem;
            color: #4b5563;
            margin-top: 0.2rem;
        }
        .animation-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .menu-btn {
            width: 100%;
            background: transparent;
            border: none;
            color: #9ca3af;
            padding: 0.85rem 1rem;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .menu-btn:hover {
            background-color: #1c1d26;
            color: #ffffff;
        }
        .menu-btn.active {
            background-color: #1e293b;
            border-left: 4px solid #3b82f6;
            color: #eff6ff;
        }
        .theater-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: #07080c;
        }
        .screen-frame {
            width: 100%;
            max-width: 840px;
            background-color: #12131a;
            border: 1px solid #1f2029;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-top: 75%;
            background-color: #000000;
        }
        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .title-bar {
            padding: 1.25rem 1.5rem;
            background-color: #12131a;
            font-size: 1.05rem;
            font-weight: 600;
            color: #f3f4f6;
            border-top: 1px solid #1f2029;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .live-badge {
            font-size: 0.75rem;
            background-color: #10b981;
            color: #ffffff;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
        }
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #1f2029;
            }
            .animation-list {
                flex-direction: row;
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }
            .menu-btn {
                white-space: nowrap;
            }
            .theater-container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <h1>Sonic Calamity<h1>
            <p>Select a animation to load</p>
        </div>
        <ul class="animation-list">
            <li>
                <button class="menu-btn active" data-src="https://scratch.mit.edu/projects/1363020279/embed" data-title="#1 - Project 1">
                    Project 1
                </button>
            </li>
            <li>
                <button class="menu-btn" data-src="https://scratch.mit.edu/projects/1363181092/embed" data-title="#2 - Project 2">
                    Project 2
                </button>
            </li>
            <li>
                <button class="menu-btn" data-src="https://scratch.mit.edu/projects/1363187806/embed" data-title="Sonic Animation - Project 3">
                    Project 3
                </button>
            </li>
            <li>
                <button class="menu-btn" data-src="https://scratch.mit.edu/projects/1363191767/embed" data-title="Sonic Animation - Project 4">
                    Project 4
                </button>
            </li>
        </ul>
    </nav>

    <main class="theater-container">
        <div class="screen-frame">
            <div class="iframe-wrapper">
                <iframe id="theaterFrame" src="https://scratch.mit.edu/projects/1363020279/embed" allowfullscreen="true" scrolling="no" allow="cross-origin-isolated"></iframe>
            </div>
            <div class="title-bar">
                <span id="videoTitle">Sonic Animation - Project 1</span>
                <span class="live-badge">Theater Mode</span>
            </div>
        </div>
    </main>

    <script>
        const buttons = document.querySelectorAll('.menu-btn');
        const frame = document.getElementById('theaterFrame');
        const displayTitle = document.getElementById('videoTitle');

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                document.querySelector('.menu-btn.active').classList.remove('active');
                button.classList.add('active');
                
                frame.src = button.getAttribute('data-src');
                displayTitle.textContent = button.getAttribute('data-title');
            });
        });
    </script>

</body>
</html>
